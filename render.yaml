services:
  - type: web
    name: tablespot-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: tablespot-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CLIENT_URL
        sync: false          # Set this in Render dashboard → your Netlify URL
      - key: GEMINI_API_KEY
        sync: false          # Set this in Render dashboard
      - key: ADMIN_EMAIL
        sync: false          # Set this in Render dashboard
      - key: ADMIN_PASSWORD
        sync: false          # Set this in Render dashboard

databases:
  - name: tablespot-db
    plan: free
